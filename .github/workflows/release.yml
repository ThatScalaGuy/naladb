name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  binaries:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o naladb ./cmd/naladb

      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o naladb-cli ./cmd/naladb-cli

      - name: Package
        run: |
          tar czf naladb-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz naladb naladb-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: naladb-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: naladb-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push naladb
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            thatscalaguy/naladb:latest
            thatscalaguy/naladb:${{ steps.version.outputs.tag }}

      - name: Build and push naladb-cli
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.cli
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            thatscalaguy/naladb-cli:latest
            thatscalaguy/naladb-cli:${{ steps.version.outputs.tag }}

  publish:
    needs: [binaries, docker]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*.tar.gz
