name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build server
        run: make build

      - name: Build CLI
        run: make build-cli

      - name: Test
        run: make test

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
