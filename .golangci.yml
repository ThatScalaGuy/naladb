version: "2"
run:
  go: "1.26"
linters:
  enable:
    - misspell
    - prealloc
    - unconvert
    - unparam
  settings:
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - unparam
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/thatscalaguy/naladb
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
